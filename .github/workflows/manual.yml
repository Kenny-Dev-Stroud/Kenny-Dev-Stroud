name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Kenny-Dev-Stroud
          outputs: |
            # Mudamos o nome para 'github-tetris-final.gif' para forçar a atualização
            dist/github-tetris-final.gif?snake_mode=tetris&color_snake=#fe53bb
            dist/github-snake-dark.svg?palette=github-dark&snake_mode=tetris

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
